name: l10n-lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  l10n-lint:
    name: l10n-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run l10n lint
        run: python scripts/l10n_lint.py
