name: pages-l10n-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  pages-l10n-self-test:
    name: pages-l10n-self-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pages l10n gate self-test
        run: python scripts/recipes_page_l10n_gate.py --self-test

  pages-l10n-gate:
    name: pages-l10n-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pages l10n gate
        run: python scripts/recipes_page_l10n_gate.py
