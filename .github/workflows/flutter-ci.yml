name: flutter-ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Create CI .env placeholder
        shell: bash
        run: |
          if [ ! -f .env ]; then
            {
              echo "SUPABASE_URL=https://example.supabase.co"
              echo "SUPABASE_ANON_KEY=ci_dummy_key"
            } > .env
          fi

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web (wasm, preview mode)
        run: flutter build web --wasm --dart-define=HOME_UI_PREVIEW=true
