name: flutter-ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Detect Flutter project dir
        id: project
        shell: bash
        run: |
          pubspec=$(find . -maxdepth 6 -name pubspec.yaml | head -n 1)
          if [ -z "$pubspec" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No pubspec.yaml found in repository. Skip Flutter checks for now."
          else
            dir=$(dirname "$pubspec")
            dir="${dir#./}"
            [ -z "$dir" ] && dir="."
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "dir=$dir" >> "$GITHUB_OUTPUT"
            echo "Flutter project dir: $dir"
          fi

      - name: Flutter version
        if: steps.project.outputs.found == 'true'
        run: flutter --version

      - name: Get dependencies
        if: steps.project.outputs.found == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: flutter pub get

      - name: Analyze
        if: steps.project.outputs.found == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: flutter analyze

      - name: Build web (wasm, preview mode)
        if: steps.project.outputs.found == 'true'
        working-directory: ${{ steps.project.outputs.dir }}
        run: flutter build web --wasm --dart-define=HOME_UI_PREVIEW=true

      - name: No Flutter project (temporary pass)
        if: steps.project.outputs.found != 'true'
        run: echo "No Flutter project files in repo yet. CI passed by design."
